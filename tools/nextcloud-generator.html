<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Generator kont Nextcloud | IT Toolbox</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#1a1d23;--bg-card:#1f2229;--bg-card-hover:#262930;
    --accent:#40e8da;--accent-dim:rgba(122,203,228,.233);--accent-border:rgba(14,63,78,.514);
    --cyan:#40c8e8;--cyan-dim:rgba(64,200,232,.10);--cyan-border:rgba(64,200,232,.20);
    --red:#e84040;--red-dim:rgba(232,64,64,.08);--red-border:rgba(232,64,64,.18);
    --green:#40e870;--green-dim:rgba(64,232,112,.08);--green-border:rgba(64,232,112,.18);
    --purple:#a070e8;--purple-dim:rgba(160,112,232,.08);--purple-border:rgba(160,112,232,.18);
    --text:#c8cad0;--text-bright:#e4e6ea;--text-muted:#7a7e88;--text-dim:#50545e;
    --line:rgba(200,202,208,.08);--line-strong:rgba(200,202,208,.15);
    --font-title:'Space Grotesk',sans-serif;--font-body:'Inter',sans-serif;--font-mono:'JetBrains Mono',monospace;
  }
  *,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
  body{
    font-family:var(--font-body);background:var(--bg);color:var(--text);
    line-height:1.65;min-height:100vh;
    background-image:linear-gradient(var(--line) 1px,transparent 1px),linear-gradient(90deg,var(--line) 1px,transparent 1px);
    background-size:60px 60px;
  }
  nav{
    padding:1rem 2rem;display:flex;justify-content:space-between;align-items:center;
    background:rgba(26,29,35,.92);backdrop-filter:blur(16px);
    border-bottom:1px solid var(--line-strong);position:sticky;top:0;z-index:100;
  }
  .nav-logo{font-family:var(--font-mono);font-size:.9rem;font-weight:600;color:var(--accent);text-decoration:none;letter-spacing:.05em;}
  .nav-back{color:var(--text-muted);text-decoration:none;font-family:var(--font-mono);font-size:.7rem;letter-spacing:.06em;text-transform:uppercase;transition:color .2s;}
  .nav-back:hover{color:var(--cyan);}
  .container{max-width:600px;margin:0 auto;padding:2rem 1.5rem 4rem;}
  .page-header{text-align:center;margin-bottom:2rem;}
  .page-header .icon{font-size:2rem;margin-bottom:.5rem;}
  .page-header h1{font-family:var(--font-title);font-size:1.5rem;font-weight:600;color:var(--text-bright);margin-bottom:.2rem;}
  .page-header p{color:var(--text-muted);font-size:.85rem;}
  .form-group{margin-bottom:.85rem;}
  .form-group label{display:block;font-family:var(--font-mono);font-size:.6rem;font-weight:500;color:var(--text-dim);margin-bottom:.35rem;letter-spacing:.12em;text-transform:uppercase;}
  .form-row{display:grid;grid-template-columns:1fr 1fr;gap:.6rem;}
  input[type="text"],input[type="email"]{
    width:100%;padding:.65rem .9rem;background:var(--bg-card);
    border:1px solid var(--line-strong);color:var(--text-bright);
    font-family:var(--font-body);font-size:.9rem;transition:border-color .2s;outline:none;
  }
  input:focus{border-color:var(--accent);}
  input::placeholder{color:var(--text-dim);}
  .slider-wrap{display:flex;align-items:center;gap:.75rem;}
  .slider-wrap input[type="range"]{flex:1;accent-color:var(--accent);}
  .slider-val{font-family:var(--font-mono);font-size:1rem;font-weight:600;color:var(--accent);min-width:28px;text-align:center;}
  .btn-generate{
    width:100%;padding:.75rem;background:var(--accent);color:#14161b;border:none;
    font-family:var(--font-mono);font-size:.75rem;font-weight:700;
    letter-spacing:.1em;text-transform:uppercase;cursor:pointer;transition:all .2s;margin-top:.5rem;
  }
  .btn-generate:hover{box-shadow:0 0 25px rgba(64,232,218,.2);transform:translateY(-1px);}
  .btn-generate:disabled{opacity:.3;cursor:not-allowed;transform:none;box-shadow:none;}
  .results{margin-top:1.75rem;display:flex;flex-direction:column;gap:.75rem;}
  .result-card{padding:.9rem 1.1rem;border:1px solid;position:relative;}
  .result-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:.4rem;}
  .result-tag{font-family:var(--font-mono);font-size:.5rem;font-weight:600;letter-spacing:.15em;text-transform:uppercase;padding:.2rem .5rem;border:1px solid;}
  .result-card code{font-family:var(--font-mono);font-size:.95rem;word-break:break-all;display:block;font-weight:500;}
  .result-card pre{font-size:.8rem;white-space:pre-wrap;margin:0;line-height:1.6;font-family:var(--font-body);}
  .card-login{background:var(--cyan-dim);border-color:var(--cyan-border);}
  .card-login .result-tag{border-color:var(--cyan-border);color:var(--cyan);background:var(--cyan-dim);}
  .card-login code{color:var(--cyan);}
  .card-pass{background:var(--red-dim);border-color:var(--red-border);}
  .card-pass .result-tag{border-color:var(--red-border);color:var(--red);background:var(--red-dim);}
  .card-pass code{color:#f07070;}
  .card-privnote{background:var(--purple-dim);border-color:var(--purple-border);}
  .card-privnote .result-tag{border-color:var(--purple-border);color:var(--purple);background:var(--purple-dim);}
  .card-privnote p{color:#b898e8;font-size:.8rem;margin:0;}
  .card-mail{background:var(--green-dim);border-color:var(--green-border);}
  .card-mail .result-tag{border-color:var(--green-border);color:var(--green);background:var(--green-dim);}
  .card-mail pre{color:#80e8a0;}
  .btn-sm{
    padding:.25rem .6rem;border:1px solid var(--line-strong);background:transparent;
    font-family:var(--font-mono);font-size:.6rem;font-weight:600;
    letter-spacing:.08em;text-transform:uppercase;cursor:pointer;transition:all .2s;color:var(--text-muted);
  }
  .btn-sm:hover{border-color:var(--cyan);color:var(--cyan);}
  .btn-accent{border-color:var(--accent-border);color:var(--accent);}
  .btn-accent:hover{background:var(--accent-dim);}
  .btn-purple{color:var(--purple);border-color:var(--purple-border);text-decoration:none;display:inline-block;}
  .btn-purple:hover{background:var(--purple-dim);}
  .btn-green{color:var(--green);border-color:var(--green-border);text-decoration:none;display:inline-block;}
  .btn-green:hover{background:var(--green-dim);}
  .btn-group{display:flex;gap:.4rem;align-items:center;}
  .hidden{display:none !important;}
  @media(max-width:640px){nav{padding:.75rem 1rem;}.container{padding:1.5rem 1rem 3rem;}.form-row{grid-template-columns:1fr;}}
</style>
</head>
<body>
<nav>
  <a href="index.html" class="nav-logo">HZ://TOOLBOX</a>
  <a href="index.html" class="nav-back">← Panel</a>
</nav>
<div class="container">
  <div class="page-header">
    <div class="icon">☁️</div>
    <h1>Generator kont Nextcloud</h1>
    <p>Wygeneruj login, hasło i treść maila</p>
  </div>
  <div class="form-group"><div class="form-row">
    <div><label>Imię</label><input type="text" id="firstName" placeholder="np. Adam"></div>
    <div><label>Nazwisko</label><input type="text" id="lastName" placeholder="np. Macieja"></div>
  </div></div>
  <div class="form-group"><label>Firma</label><input type="text" id="company" placeholder="np. Geodmix"></div>
  <div class="form-group"><label>Email odbiorcy (opcjonalnie)</label><input type="email" id="email" placeholder="np. adam@geodmix.pl"></div>
  <div class="form-group"><label>Długość hasła</label><div class="slider-wrap"><input type="range" id="passLength" min="10" max="20" value="14"><span class="slider-val" id="passLengthVal">14</span></div></div>
  <button class="btn-generate" id="generateBtn" disabled>▶ Generuj dane konta</button>
  <div class="results hidden" id="results">
    <div class="result-card card-login"><div class="result-header"><span class="result-tag">LOGIN</span><button class="btn-sm" onclick="copyText('loginVal',this)">Kopiuj</button></div><code id="loginVal"></code></div>
    <div class="result-card card-pass"><div class="result-header"><span class="result-tag">HASŁO</span><div class="btn-group"><button class="btn-sm" onclick="copyText('passVal',this)">Kopiuj</button><button class="btn-sm btn-accent" onclick="regeneratePassword()">↻ Nowe</button></div></div><code id="passVal"></code></div>
    <div class="result-card card-privnote"><div class="result-header"><span class="result-tag">PRIVNOTE</span><a href="https://privnote.com" target="_blank" rel="noopener noreferrer" class="btn-sm btn-purple">Otwórz Privnote ↗</a></div><p>Kliknij przycisk powyżej, wklej hasło i skopiuj wygenerowany link do maila.</p></div>
    <div class="result-card card-mail"><div class="result-header"><span class="result-tag">TREŚĆ MAILA</span><div class="btn-group"><button class="btn-sm" onclick="copyMail(this)">Kopiuj</button><a href="#" id="mailtoLink" class="btn-sm btn-green hidden">✉ Otwórz w mailu</a></div></div><pre id="mailBody"></pre></div>
  </div>
</div>
<script>
  const polishMap={ą:"a",ć:"c",ę:"e",ł:"l",ń:"n",ó:"o",ś:"s",ź:"z",ż:"z",Ą:"A",Ć:"C",Ę:"E",Ł:"L",Ń:"N",Ó:"O",Ś:"S",Ź:"Z",Ż:"Z"};
  const norm=s=>s.replace(/[ąćęłńóśźżĄĆĘŁŃÓŚŹŻ]/g,c=>polishMap[c]||c);
  function genPassword(len){const lo="abcdefghijkmnopqrstuvwxyz",up="ABCDEFGHJKLMNPQRSTUVWXYZ",di="23456789",sp="!@#$%^&*_+-=",all=lo+up+di+sp;const arr=new Uint32Array(len);crypto.getRandomValues(arr);const pick=(s,r)=>s[r%s.length];let p=[pick(lo,arr[0]),pick(up,arr[1]),pick(di,arr[2]),pick(sp,arr[3])];for(let i=4;i<len;i++)p.push(pick(all,arr[i]));for(let i=p.length-1;i>0;i--){const j=arr[i]%(i+1);[p[i],p[j]]=[p[j],p[i]];}return p.join("");}
  let currentLogin="",currentPass="";
  const $=id=>document.getElementById(id);
  const inputs=["firstName","lastName","company"].map(id=>$(id));
  function checkValid(){$("generateBtn").disabled=!inputs.every(i=>i.value.trim().length>0);}
  inputs.forEach(i=>i.addEventListener("input",checkValid));
  $("passLength").addEventListener("input",e=>{$("passLengthVal").textContent=e.target.value;});
  $("generateBtn").addEventListener("click",generate);
  function generate(){const fn=norm($("firstName").value.trim()).toLowerCase();const ln=norm($("lastName").value.trim()).toLowerCase().replace(/\s+/g,"");const co=norm($("company").value.trim()).toLowerCase().replace(/\s+/g,"");if(!fn||!ln||!co)return;currentLogin=fn[0]+ln+"_"+co;currentPass=genPassword(parseInt($("passLength").value));$("loginVal").textContent=currentLogin;$("passVal").textContent=currentPass;updateMail();$("results").classList.remove("hidden");}
  function regeneratePassword(){currentPass=genPassword(parseInt($("passLength").value));$("passVal").textContent=currentPass;updateMail();}
  function updateMail(){const body=`Witam,\n\nprzesyłam dane do Nextcloud (dostęp do odpowiednich folderów nadają właściciele).\n\nAdres: https://cloud.electrum.pl/\nLogin: ${currentLogin}\nHasło: [wklej link Privnote tutaj]\n\n- link jest jednorazowy, zalecana zmiana hasła po zalogowaniu`;$("mailBody").textContent=body;const email=$("email").value.trim();const mailto=$("mailtoLink");if(email){mailto.href=`mailto:${email}?subject=${encodeURIComponent("Dane do Nextcloud")}&body=${encodeURIComponent(body)}`;mailto.classList.remove("hidden");}else{mailto.classList.add("hidden");}}
  async function copyText(id,btn){try{await navigator.clipboard.writeText($(id).textContent);const o=btn.textContent;btn.textContent="✓ OK";btn.style.borderColor="var(--green)";btn.style.color="var(--green)";setTimeout(()=>{btn.textContent=o;btn.style.borderColor="";btn.style.color="";},1500);}catch{}}
  async function copyMail(btn){try{await navigator.clipboard.writeText($("mailBody").textContent);const o=btn.textContent;btn.textContent="✓ OK";btn.style.borderColor="var(--green)";btn.style.color="var(--green)";setTimeout(()=>{btn.textContent=o;btn.style.borderColor="";btn.style.color="";},1500);}catch{}}
  $("email").addEventListener("input",()=>{if(currentLogin)updateMail();});
</script>
</body>
</html>
