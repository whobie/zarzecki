<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Generator haseł | IT Toolbox</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#1a1d23;--bg-card:#1f2229;--bg-card-hover:#262930;
    --accent:#40e8da;--accent-dim:rgba(122,203,228,.233);--accent-border:rgba(14,63,78,.514);
    --cyan:#40c8e8;--cyan-dim:rgba(64,200,232,.10);--cyan-border:rgba(64,200,232,.20);
    --red:#e84040;--green:#40e870;--yellow:#e8c840;
    --text:#c8cad0;--text-bright:#e4e6ea;--text-muted:#7a7e88;--text-dim:#50545e;
    --line:rgba(200,202,208,.08);--line-strong:rgba(200,202,208,.15);
    --font-title:'Space Grotesk',sans-serif;--font-body:'Inter',sans-serif;--font-mono:'JetBrains Mono',monospace;
  }
  *,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
  body{
    font-family:var(--font-body);background:var(--bg);color:var(--text);
    line-height:1.65;min-height:100vh;
    background-image:linear-gradient(var(--line) 1px,transparent 1px),linear-gradient(90deg,var(--line) 1px,transparent 1px);
    background-size:60px 60px;
  }
  nav{
    padding:1rem 2rem;display:flex;justify-content:space-between;align-items:center;
    background:rgba(26,29,35,.92);backdrop-filter:blur(16px);
    border-bottom:1px solid var(--line-strong);position:sticky;top:0;z-index:100;
  }
  .nav-logo{font-family:var(--font-mono);font-size:.9rem;font-weight:600;color:var(--accent);text-decoration:none;letter-spacing:.05em;}
  .nav-back{color:var(--text-muted);text-decoration:none;font-family:var(--font-mono);font-size:.7rem;letter-spacing:.06em;text-transform:uppercase;transition:color .2s;}
  .nav-back:hover{color:var(--cyan);}
  .container{max-width:560px;margin:0 auto;padding:2rem 1.5rem 4rem;}
  .page-header{text-align:center;margin-bottom:2rem;}
  .page-header .icon{font-size:2rem;margin-bottom:.5rem;}
  .page-header h1{font-family:var(--font-title);font-size:1.5rem;font-weight:600;color:var(--text-bright);margin-bottom:.2rem;}
  .page-header p{color:var(--text-muted);font-size:.85rem;}
  .pass-display{background:var(--bg-card);border:1px solid var(--line-strong);padding:1.5rem;text-align:center;margin-bottom:1.25rem;}
  .pass-text{font-family:var(--font-mono);font-size:1.3rem;font-weight:600;word-break:break-all;line-height:1.8;letter-spacing:.04em;margin-bottom:1rem;}
  .pass-text .lower{color:var(--cyan);}
  .pass-text .upper{color:var(--green);}
  .pass-text .digit{color:var(--yellow);}
  .pass-text .special{color:var(--red);}
  .pass-actions{display:flex;gap:.6rem;justify-content:center;flex-wrap:wrap;}
  .btn{padding:.55rem 1.1rem;font-family:var(--font-mono);font-size:.7rem;font-weight:600;letter-spacing:.08em;text-transform:uppercase;cursor:pointer;transition:all .2s;border:none;}
  .btn-primary{background:var(--accent);color:#14161b;}
  .btn-primary:hover{box-shadow:0 0 20px rgba(64,232,218,.2);transform:translateY(-1px);}
  .btn-ghost{background:transparent;border:1px solid var(--line-strong);color:var(--text-muted);}
  .btn-ghost:hover{border-color:var(--accent);color:var(--accent);}
  .strength-bar{height:3px;background:rgba(200,202,208,.08);margin-bottom:.4rem;overflow:hidden;}
  .strength-fill{height:100%;transition:all .3s;}
  .strength-text{font-family:var(--font-mono);font-size:.65rem;letter-spacing:.06em;}
  .controls{background:var(--bg-card);border:1px solid var(--line-strong);padding:1.1rem;}
  .control-row{display:flex;justify-content:space-between;align-items:center;padding:.5rem 0;}
  .control-row+.control-row{border-top:1px solid var(--line);}
  .control-label{font-size:.85rem;color:var(--text-muted);}
  .control-label span{font-family:var(--font-mono);font-size:.75rem;}
  .slider-wrap{display:flex;align-items:center;gap:.75rem;}
  .slider-wrap input[type="range"]{width:150px;accent-color:var(--accent);}
  .slider-val{font-family:var(--font-mono);font-size:1rem;font-weight:600;color:var(--accent);min-width:28px;text-align:center;}
  .toggle{position:relative;width:40px;height:22px;cursor:pointer;}
  .toggle input{opacity:0;width:0;height:0;}
  .toggle .track{position:absolute;inset:0;background:rgba(200,202,208,.12);transition:.2s;}
  .toggle input:checked+.track{background:var(--accent);}
  .toggle .track::after{content:'';position:absolute;width:16px;height:16px;background:var(--text-bright);top:3px;left:3px;transition:.2s;}
  .toggle input:checked+.track::after{transform:translateX(18px);}
  .history{margin-top:1.25rem;}
  .history h3{font-family:var(--font-mono);font-size:.55rem;text-transform:uppercase;letter-spacing:.15em;color:var(--text-dim);margin-bottom:.6rem;}
  .history-item{display:flex;justify-content:space-between;align-items:center;padding:.4rem .7rem;background:var(--bg-card);border:1px solid var(--line);margin-bottom:.3rem;font-family:var(--font-mono);font-size:.7rem;color:var(--text-muted);}
  .history-item button{padding:.2rem .4rem;background:transparent;border:1px solid var(--line-strong);color:var(--text-dim);font-family:var(--font-mono);font-size:.55rem;letter-spacing:.05em;cursor:pointer;text-transform:uppercase;transition:all .2s;}
  .history-item button:hover{border-color:var(--accent);color:var(--accent);}
  @media(max-width:640px){nav{padding:.75rem 1rem;}.container{padding:1.5rem 1rem 3rem;}.pass-text{font-size:1rem;}.slider-wrap input[type="range"]{width:110px;}}
</style>
</head>
<body>
<nav>
  <a href="index.html" class="nav-logo">HZ://TOOLBOX</a>
  <a href="index.html" class="nav-back">← Panel</a>
</nav>
<div class="container">
  <div class="page-header"><div class="icon">🔐</div><h1>Generator haseł</h1><p>Bezpieczne hasła z kolorowaniem znaków</p></div>
  <div class="pass-display">
    <div class="pass-text" id="passText"></div>
    <div class="strength-bar"><div class="strength-fill" id="strengthFill"></div></div>
    <div class="strength-text" id="strengthText"></div>
    <div class="pass-actions" style="margin-top:.85rem;">
      <button class="btn btn-primary" id="copyBtn" onclick="copyPass()">Kopiuj</button>
      <button class="btn btn-ghost" onclick="generate()">↻ Generuj nowe</button>
    </div>
  </div>
  <div class="controls">
    <div class="control-row"><span class="control-label">Długość</span><div class="slider-wrap"><input type="range" id="lenSlider" min="6" max="64" value="16"><span class="slider-val" id="lenVal">16</span></div></div>
    <div class="control-row"><span class="control-label">Małe litery <span style="color:var(--cyan)">abc</span></span><label class="toggle"><input type="checkbox" id="optLower" checked><span class="track"></span></label></div>
    <div class="control-row"><span class="control-label">Wielkie litery <span style="color:var(--green)">ABC</span></span><label class="toggle"><input type="checkbox" id="optUpper" checked><span class="track"></span></label></div>
    <div class="control-row"><span class="control-label">Cyfry <span style="color:var(--yellow)">123</span></span><label class="toggle"><input type="checkbox" id="optDigits" checked><span class="track"></span></label></div>
    <div class="control-row"><span class="control-label">Znaki specjalne <span style="color:var(--red)">!@#</span></span><label class="toggle"><input type="checkbox" id="optSpecial" checked><span class="track"></span></label></div>
  </div>
  <div class="history"><h3>Historia generacji</h3><div id="historyList"></div></div>
</div>
<script>
  const lower="abcdefghijkmnopqrstuvwxyz",upper="ABCDEFGHJKLMNPQRSTUVWXYZ",digits="23456789",special="!@#$%^&*_+-=";
  let currentPass="",history=[];
  const $=id=>document.getElementById(id);
  function getOpts(){return{lower:$("optLower").checked,upper:$("optUpper").checked,digits:$("optDigits").checked,special:$("optSpecial").checked};}
  function ensureOne(id){const o=getOpts();if(![o.lower,o.upper,o.digits,o.special].some(Boolean))$(id).checked=true;}
  ["optLower","optUpper","optDigits","optSpecial"].forEach(id=>{$(id).addEventListener("change",()=>{ensureOne(id);generate();});});
  $("lenSlider").addEventListener("input",e=>{$("lenVal").textContent=e.target.value;generate();});
  function generate(){const opts=getOpts(),len=parseInt($("lenSlider").value);let pool="";if(opts.lower)pool+=lower;if(opts.upper)pool+=upper;if(opts.digits)pool+=digits;if(opts.special)pool+=special;const arr=new Uint32Array(len);crypto.getRandomValues(arr);let req=[],ri=0;if(opts.lower)req.push(lower[arr[ri++]%lower.length]);if(opts.upper)req.push(upper[arr[ri++]%upper.length]);if(opts.digits)req.push(digits[arr[ri++]%digits.length]);if(opts.special)req.push(special[arr[ri++]%special.length]);let pass=[...req];for(let i=pass.length;i<len;i++)pass.push(pool[arr[i]%pool.length]);for(let i=pass.length-1;i>0;i--){const j=arr[i]%(i+1);[pass[i],pass[j]]=[pass[j],pass[i]];}currentPass=pass.join("");renderPass();updateStrength(opts,len);history.unshift(currentPass);if(history.length>5)history.pop();renderHistory();}
  function renderPass(){$("passText").innerHTML=currentPass.split("").map(c=>{if(lower.includes(c))return`<span class="lower">${c}</span>`;if(upper.includes(c))return`<span class="upper">${c}</span>`;if(digits.includes(c))return`<span class="digit">${c}</span>`;return`<span class="special">${c}</span>`;}).join("");}
  function updateStrength(opts,len){let ps=0;if(opts.lower)ps+=26;if(opts.upper)ps+=26;if(opts.digits)ps+=10;if(opts.special)ps+=12;const ent=Math.floor(len*Math.log2(ps));let label,color,pct;if(ent<40){label="SŁABE";color="var(--red)";pct=25;}else if(ent<60){label="ŚREDNIE";color="var(--yellow)";pct=50;}else if(ent<80){label="SILNE";color="var(--green)";pct=75;}else{label="BARDZO SILNE";color="var(--accent)";pct=100;}$("strengthFill").style.width=pct+"%";$("strengthFill").style.background=color;$("strengthText").textContent=`${label} — ${ent} BITÓW ENTROPII`;$("strengthText").style.color=color;}
  function renderHistory(){$("historyList").innerHTML=history.map((p,i)=>`<div class="history-item"><span>${p}</span><button onclick="copyH(${i})">Kopiuj</button></div>`).join("");}
  async function copyPass(){try{await navigator.clipboard.writeText(currentPass);const b=$("copyBtn");b.textContent="✓ OK";b.style.background="var(--green)";setTimeout(()=>{b.textContent="Kopiuj";b.style.background="";},1500);}catch{}}
  async function copyH(i){try{await navigator.clipboard.writeText(history[i]);}catch{}}
  generate();
</script>
</body>
</html>
