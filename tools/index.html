<!DOCTYPE html>
<html lang="pl" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IT Toolbox — Autoryzacja</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root,
  [data-theme="dark"] {
    --bg:#1a1d23;--bg-darker:#14161b;--bg-card:#1f2229;--bg-card-hover:#262930;
    --accent:#40e8da;--accent-dim:rgba(122,203,228,.233);--accent-border:rgba(14,63,78,.514);
    --cyan:#40c8e8;--cyan-dim:rgba(64,200,232,.10);--cyan-border:rgba(64,200,232,.20);
    --text:#c8cad0;--text-bright:#e4e6ea;--text-muted:#7a7e88;--text-dim:#50545e;
    --line:rgba(200,202,208,.08);--line-strong:rgba(200,202,208,.15);
    --nav-bg:rgba(26,29,35,.92);
    --font-title:'Space Grotesk',sans-serif;--font-body:'Inter',sans-serif;--font-mono:'JetBrains Mono',monospace;
  }
  [data-theme="light"] {
    --bg:#f0f2f5;--bg-darker:#e4e7ec;--bg-card:#ffffff;--bg-card-hover:#f7f9fc;
    --accent:#0b9e93;--accent-dim:rgba(11,158,147,.10);--accent-border:rgba(11,158,147,.25);
    --cyan:#0891b2;--cyan-dim:rgba(8,145,178,.08);--cyan-border:rgba(8,145,178,.20);
    --text:#4b5263;--text-bright:#1a1d23;--text-muted:#6b7280;--text-dim:#9ca3af;
    --line:rgba(0,0,0,.07);--line-strong:rgba(0,0,0,.12);
    --nav-bg:rgba(240,242,245,.92);
  }
  *,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
  html{scroll-behavior:smooth;}
  body{
    font-family:var(--font-body);background:var(--bg);color:var(--text);
    line-height:1.65;min-height:100vh;
    transition:background .3s,color .3s;
    background-image:linear-gradient(var(--line) 1px,transparent 1px),linear-gradient(90deg,var(--line) 1px,transparent 1px);
    background-size:60px 60px;
  }

  /* NAV — identyczny układ jak w głównym index */
  nav{
    position:fixed;top:0;left:0;right:0;z-index:100;
    display:grid;grid-template-columns:1fr auto 1fr;
    align-items:center;padding:1rem 2rem;
    background:var(--nav-bg);backdrop-filter:blur(16px);
    border-bottom:1px solid var(--line-strong);
    transition:background .3s,border-color .3s;
  }
  .nav-inner{display:contents;}
  .nav-logo{
    font-family:var(--font-mono);font-size:1rem;font-weight:600;
    color:var(--accent);text-decoration:none;letter-spacing:.05em;
    justify-self:start;transition:color .3s;
  }
  .nav-links{
    display:flex;gap:2rem;list-style:none;
    justify-self:center;
  }
  .nav-links a{
    color:var(--text-muted);text-decoration:none;font-family:var(--font-mono);
    font-size:.65rem;font-weight:500;letter-spacing:.1em;text-transform:uppercase;
    transition:color .2s;padding:.3rem 0;position:relative;
  }
  .nav-links a::after{
    content:'';position:absolute;bottom:0;left:0;width:0;height:1px;
    background:var(--cyan);transition:width .3s;
  }
  .nav-links a:hover{color:var(--cyan);}
  .nav-links a:hover::after{width:100%;}
  .nav-links a.active{color:var(--accent);}
  .nav-links a.active::after{width:100%;background:var(--accent);}
  .theme-toggle{
    justify-self:end;
    background:var(--bg-card);border:1px solid var(--line-strong);
    cursor:pointer;padding:.3rem .5rem;display:flex;align-items:center;gap:.4rem;
    font-family:var(--font-mono);font-size:.55rem;font-weight:500;
    color:var(--text-muted);letter-spacing:.06em;text-transform:uppercase;
    transition:all .2s;
  }
  .theme-toggle:hover{border-color:var(--cyan-border);color:var(--cyan);}
  .toggle-icon{font-size:.75rem;line-height:1;}

  /* LOGIN */
  .login-screen{
    display:flex;align-items:center;justify-content:center;
    min-height:100vh;padding:2rem;padding-top:80px;
  }
  .login-box{width:100%;max-width:380px;text-align:center;}
  .login-box h1{font-family:var(--font-title);font-size:1.5rem;font-weight:600;color:var(--text-bright);margin-bottom:.4rem;}
  .login-box p{color:var(--text-muted);font-size:.85rem;margin-bottom:2rem;}
  .login-field{
    width:100%;padding:.75rem 1rem;background:var(--bg-card);
    border:1px solid var(--line-strong);color:var(--text-bright);
    font-family:var(--font-mono);font-size:.9rem;outline:none;
    transition:border-color .2s,background .3s;text-align:center;letter-spacing:.15em;margin-bottom:.75rem;
  }
  .login-field:focus{border-color:var(--accent);}
  .login-field::placeholder{color:var(--text-dim);letter-spacing:.05em;}
  .login-btn{
    width:100%;padding:.75rem;background:var(--accent);color:var(--bg-darker);
    border:none;font-family:var(--font-mono);font-size:.75rem;font-weight:700;
    letter-spacing:.1em;text-transform:uppercase;cursor:pointer;transition:all .2s;
  }
  .login-btn:hover{box-shadow:0 0 25px rgba(64,232,218,.2);transform:translateY(-1px);}
  .login-error{color:#e84040;font-family:var(--font-mono);font-size:.7rem;margin-top:.75rem;letter-spacing:.05em;display:none;}
  .login-hint{color:var(--text-dim);font-family:var(--font-mono);font-size:.55rem;margin-top:1.5rem;letter-spacing:.08em;text-transform:uppercase;}

  #content{display:none;padding-top:60px;}

  .dance-floor{display:flex;justify-content:center;gap:2rem;margin-bottom:2.5rem;flex-wrap:wrap;}
  .dancer{font-family:var(--font-mono);font-size:1.6rem;color:var(--text-dim);animation-duration:1s;animation-iteration-count:infinite;animation-timing-function:ease-in-out;user-select:none;}
  .dancer:nth-child(1){animation-name:dance1;animation-delay:0s;}
  .dancer:nth-child(2){animation-name:dance2;animation-delay:.15s;}
  .dancer:nth-child(3){animation-name:dance3;animation-delay:.3s;}
  .dancer:nth-child(4){animation-name:dance1;animation-delay:.45s;}
  .dancer:nth-child(5){animation-name:dance2;animation-delay:.6s;}
  @keyframes dance1{0%,100%{transform:translateY(0) rotate(0deg);}25%{transform:translateY(-12px) rotate(-8deg);}50%{transform:translateY(0) rotate(0deg);}75%{transform:translateY(-8px) rotate(8deg);}}
  @keyframes dance2{0%,100%{transform:translateY(0) scaleX(1);}25%{transform:translateY(-10px) scaleX(-1);}50%{transform:translateY(0) scaleX(1);}75%{transform:translateY(-14px) scaleX(-1);}}
  @keyframes dance3{0%,100%{transform:translateY(0) rotate(0deg);}33%{transform:translateY(-16px) rotate(12deg);}66%{transform:translateY(-4px) rotate(-12deg);}}
  .dance-label{font-family:var(--font-mono);font-size:.5rem;color:var(--text-dim);letter-spacing:.15em;text-transform:uppercase;text-align:center;margin-bottom:2rem;}

  @media(max-width:480px){
    nav{padding:.75rem 1rem;}
    .nav-links{gap:1rem;}
    .nav-links a{font-size:.55rem;}
    .theme-toggle span{display:none;}
  }
</style>
</head>
<body>

<nav>
  <div class="nav-inner">
    <a href="../index.html" class="nav-logo">HZ://</a>
    <ul class="nav-links">
      <li><a href="../index.html">Wizytówka</a></li>
      <li><a href="index.html" class="active">Toolbox</a></li>
    </ul>
    <button class="theme-toggle" id="themeToggle" aria-label="Przełącz motyw">
      <span class="toggle-icon" id="themeIcon">☀</span>
      <span id="themeLabel">Light</span>
    </button>
  </div>
</nav>

<div id="loginScreen" class="login-screen">
  <div class="login-box">
    <div class="dance-floor">
      <div class="dancer">┏(・o・)┛</div>
      <div class="dancer">┗(^o^ )┓</div>
      <div class="dancer">♪┏(・o・)┛</div>
      <div class="dancer">┗( ^o^)┓</div>
      <div class="dancer">┏(・o・)┛♪</div>
    </div>
    <div class="dance-label">Oczekiwanie na autoryzację...</div>
    <input type="password" class="login-field" id="passInput" placeholder="Wprowadź hasło" autofocus>
    <button class="login-btn" id="unlockBtn">▶ Odblokuj</button>
    <div class="login-error" id="loginError">BŁĄD: NIEPRAWIDŁOWE HASŁO</div>
    <div class="login-hint">Sekcja zabezpieczona — szyfrowanie AES-256-GCM</div>
  </div>
</div>

const html = document.documentElement;
const savedTheme = localStorage.getItem('hz-theme') || 'dark';
applyTheme(savedTheme);
function applyTheme(theme) {
  html.setAttribute('data-theme', theme);
  const icon = document.getElementById('themeIcon');
  const label = document.getElementById('themeLabel');
  if (icon) { icon.textContent = theme === 'dark' ? '☀' : '◑'; }
  if (label) { label.textContent = theme === 'dark' ? 'Light' : 'Dark'; }
  localStorage.setItem('hz-theme', theme);
}
document.getElementById('themeToggle').addEventListener('click', () => {
  applyTheme(html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
});

async function decrypt(password) {
  try {
    const salt = Uint8Array.from(atob(ENCRYPTED.salt), c => c.charCodeAt(0));
    const iv = Uint8Array.from(atob(ENCRYPTED.iv), c => c.charCodeAt(0));
    const data = Uint8Array.from(atob(ENCRYPTED.data), c => c.charCodeAt(0));
    const keyMaterial = await crypto.subtle.importKey('raw', new TextEncoder().encode(password), 'PBKDF2', false, ['deriveBits']);
    const keyBits = await crypto.subtle.deriveBits({ name: 'PBKDF2', salt, iterations: 100000, hash: 'SHA-256' }, keyMaterial, 256);
    const key = await crypto.subtle.importKey('raw', keyBits, 'AES-GCM', false, ['decrypt']);
    const decrypted = await crypto.subtle.decrypt({ name: 'AES-GCM', iv }, key, data);
    return new TextDecoder().decode(decrypted);
  } catch (e) { return null; }
}

async function tryUnlock() {
  const pass = document.getElementById('passInput').value;
  if (!pass) return;
  const innerHtml = await decrypt(pass);
  if (innerHtml) {
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('content').style.display = 'block';
    document.getElementById('content').innerHTML = innerHtml;
    sessionStorage.setItem('toolbox_pass', pass);
  } else {
    const err = document.getElementById('loginError');
    err.style.display = 'block';
    document.getElementById('passInput').value = '';
    document.getElementById('passInput').focus();
    setTimeout(() => { err.style.display = 'none'; }, 3000);
  }
}

document.getElementById('unlockBtn').addEventListener('click', tryUnlock);
document.getElementById('passInput').addEventListener('keydown', e => { if (e.key === 'Enter') tryUnlock(); });
(async () => {
  const saved = sessionStorage.getItem('toolbox_pass');
  if (saved) { document.getElementById('passInput').value = saved; await tryUnlock(); }
})();
</script>
