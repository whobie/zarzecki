<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Generator skryptów PS | IT Toolbox</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#1a1d23;--bg-card:#1f2229;--bg-card-hover:#262930;
    --accent:#40e8da;--accent-dim:rgba(122,203,228,.233);--accent-border:rgba(14,63,78,.514);
    --cyan:#40c8e8;--cyan-dim:rgba(64,200,232,.10);--cyan-border:rgba(64,200,232,.20);
    --green:#40e870;--green-dim:rgba(64,232,112,.08);--green-border:rgba(64,232,112,.18);
    --purple:#a070e8;--purple-dim:rgba(160,112,232,.08);--purple-border:rgba(160,112,232,.18);
    --text:#c8cad0;--text-bright:#e4e6ea;--text-muted:#7a7e88;--text-dim:#50545e;
    --line:rgba(200,202,208,.08);--line-strong:rgba(200,202,208,.15);
    --font-title:'Space Grotesk',sans-serif;--font-body:'Inter',sans-serif;--font-mono:'JetBrains Mono',monospace;
  }
  *,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
  body{
    font-family:var(--font-body);background:var(--bg);color:var(--text);
    line-height:1.65;min-height:100vh;
    background-image:linear-gradient(var(--line) 1px,transparent 1px),linear-gradient(90deg,var(--line) 1px,transparent 1px);
    background-size:60px 60px;
  }
  nav{
    padding:1rem 2rem;display:flex;justify-content:space-between;align-items:center;
    background:rgba(26,29,35,.92);backdrop-filter:blur(16px);
    border-bottom:1px solid var(--line-strong);position:sticky;top:0;z-index:100;
  }
  .nav-logo{font-family:var(--font-mono);font-size:.9rem;font-weight:600;color:var(--accent);text-decoration:none;letter-spacing:.05em;}
  .nav-back{color:var(--text-muted);text-decoration:none;font-family:var(--font-mono);font-size:.7rem;letter-spacing:.06em;text-transform:uppercase;transition:color .2s;}
  .nav-back:hover{color:var(--cyan);}
  .container{max-width:600px;margin:0 auto;padding:2rem 1.5rem 4rem;}
  .page-header{text-align:center;margin-bottom:2rem;}
  .page-header .icon{font-size:2rem;margin-bottom:.5rem;}
  .page-header h1{font-family:var(--font-title);font-size:1.5rem;font-weight:600;color:var(--text-bright);margin-bottom:.2rem;}
  .page-header p{color:var(--text-muted);font-size:.85rem;}
  .form-group{margin-bottom:.85rem;}
  .form-group label{display:block;font-family:var(--font-mono);font-size:.6rem;font-weight:500;color:var(--text-dim);margin-bottom:.35rem;letter-spacing:.12em;text-transform:uppercase;}
  .form-row{display:grid;grid-template-columns:1fr 1fr;gap:.6rem;}
  input[type="text"],select{
    width:100%;padding:.65rem .9rem;background:var(--bg-card);
    border:1px solid var(--line-strong);color:var(--text-bright);
    font-family:var(--font-body);font-size:.9rem;transition:border-color .2s;outline:none;
  }
  select{font-family:var(--font-mono);font-size:.8rem;cursor:pointer;}
  select option{background:var(--bg-card);}
  input:focus,select:focus{border-color:var(--accent);}
  input::placeholder{color:var(--text-dim);}

  /* TYPE SELECTOR TABS */
  .type-tabs{display:flex;flex-wrap:wrap;gap:.35rem;margin-bottom:1.25rem;}
  .type-tab{
    padding:.35rem .75rem;border:1px solid var(--line-strong);background:transparent;
    font-family:var(--font-mono);font-size:.6rem;font-weight:600;letter-spacing:.08em;
    text-transform:uppercase;cursor:pointer;color:var(--text-muted);transition:all .2s;
  }
  .type-tab:hover{border-color:var(--cyan-border);color:var(--cyan);}
  .type-tab.active{border-color:var(--accent-border);color:var(--accent);background:var(--accent-dim);}

  .btn-generate{
    width:100%;padding:.75rem;background:var(--accent);color:#14161b;border:none;
    font-family:var(--font-mono);font-size:.75rem;font-weight:700;
    letter-spacing:.1em;text-transform:uppercase;cursor:pointer;transition:all .2s;margin-top:.5rem;
  }
  .btn-generate:hover{box-shadow:0 0 25px rgba(64,232,218,.2);transform:translateY(-1px);}
  .results{margin-top:1.75rem;display:none;}
  .result-card{padding:.9rem 1.1rem;border:1px solid;position:relative;}
  .result-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:.75rem;}
  .result-tag{font-family:var(--font-mono);font-size:.5rem;font-weight:600;letter-spacing:.15em;text-transform:uppercase;padding:.2rem .5rem;border:1px solid;}
  .card-script{background:var(--purple-dim);border-color:var(--purple-border);}
  .card-script .result-tag{border-color:var(--purple-border);color:var(--purple);background:var(--purple-dim);}
  .script-output{
    font-family:var(--font-mono);font-size:.78rem;color:#b898e8;
    white-space:pre;overflow-x:auto;line-height:1.7;
    padding:.25rem 0;
  }
  .script-output .kw{color:var(--cyan);}
  .script-output .cm{color:var(--text-dim);}
  .script-output .str{color:#e8b070;}
  .btn-sm{
    padding:.25rem .6rem;border:1px solid var(--line-strong);background:transparent;
    font-family:var(--font-mono);font-size:.6rem;font-weight:600;
    letter-spacing:.08em;text-transform:uppercase;cursor:pointer;transition:all .2s;color:var(--text-muted);
  }
  .btn-sm:hover{border-color:var(--cyan);color:var(--cyan);}
  .btn-group{display:flex;gap:.4rem;}
  .hint{font-family:var(--font-mono);font-size:.6rem;color:var(--text-dim);margin-top:.5rem;line-height:1.5;}
  @media(max-width:640px){nav{padding:.75rem 1rem;}.container{padding:1.5rem 1rem 3rem;}.form-row{grid-template-columns:1fr;}.type-tabs{gap:.25rem;}}
</style>
</head>
<body>
<nav>
  <a href="index.html" class="nav-logo">HZ://TOOLBOX</a>
  <a href="index.html" class="nav-back">← Panel</a>
</nav>
<div class="container">
  <div class="page-header">
    <div class="icon">⚡</div>
    <h1>Generator skryptów PowerShell</h1>
    <p>Gotowe skrypty AD i M365 do codziennej pracy</p>
  </div>

  <div class="form-group">
    <label>Typ skryptu</label>
    <div class="type-tabs" id="typeTabs">
      <button class="type-tab active" data-type="newuser">Nowy user AD</button>
      <button class="type-tab" data-type="resetpass">Reset hasła</button>
      <button class="type-tab" data-type="disableuser">Dezaktywacja</button>
      <button class="type-tab" data-type="groupmember">Dodaj do grupy</button>
      <button class="type-tab" data-type="m365license">Licencja M365</button>
      <button class="type-tab" data-type="getadinfo">Info o userze</button>
    </div>
  </div>

  <div id="psFields"></div>

  <button class="btn-generate" id="generateBtn">▶ Generuj skrypt</button>

  <div class="results" id="results">
    <div class="result-card card-script">
      <div class="result-header">
        <span class="result-tag" id="scriptLabel">Skrypt PowerShell</span>
        <div class="btn-group">
          <button class="btn-sm" onclick="copyScript(this)">Kopiuj</button>
          <button class="btn-sm" onclick="downloadScript()">↓ .ps1</button>
        </div>
      </div>
      <pre class="script-output" id="scriptOutput"></pre>
      <div class="hint" id="scriptHint"></div>
    </div>
  </div>

</div>
<script>
const $=id=>document.getElementById(id);
let currentType='newuser';
let currentScript='';

const templates={
  newuser:{
    label:'Nowy użytkownik AD',
    fields:[
      {id:'fn',label:'Imię',placeholder:'Jan',half:true},
      {id:'ln',label:'Nazwisko',placeholder:'Kowalski',half:true},
      {id:'ou',label:'OU (Distinguished Name)',placeholder:'OU=Pracownicy,DC=firma,DC=local'},
      {id:'pass',label:'Hasło tymczasowe',placeholder:'Tymczasowe123!',half:true},
      {id:'upn',label:'Sufiks UPN (domena)',placeholder:'firma.local',half:true},
    ],
    hint:'Wymaga modułu ActiveDirectory. Uruchom jako administrator domeny.',
    gen:(f)=>{
      const login=(f.fn.slice(0,1)+f.ln).toLowerCase();
      return`# Nowy użytkownik AD: ${f.fn} ${f.ln}
$FirstName = "${f.fn}"
$LastName  = "${f.ln}"
$Username  = "${login}"
$UPN       = "${login}@${f.upn}"
$OU        = "${f.ou}"
$Password  = ConvertTo-SecureString "${f.pass}" -AsPlainText -Force

New-ADUser \`
    -Name           "$FirstName $LastName" \`
    -GivenName      $FirstName \`
    -Surname        $LastName \`
    -SamAccountName $Username \`
    -UserPrincipalName $UPN \`
    -Path           $OU \`
    -AccountPassword $Password \`
    -ChangePasswordAtLogon $true \`
    -Enabled        $true

Write-Host "✓ Konto $Username zostało utworzone." -ForegroundColor Green`;
    }
  },
  resetpass:{
    label:'Reset hasła AD',
    fields:[
      {id:'user',label:'SamAccountName',placeholder:'jkowalski',half:true},
      {id:'pass',label:'Nowe hasło',placeholder:'NoweHaslo123!',half:true},
    ],
    hint:'Użytkownik będzie musiał zmienić hasło przy następnym logowaniu.',
    gen:(f)=>`# Reset hasła: ${f.user}
$Username = "${f.user}"
$Password = ConvertTo-SecureString "${f.pass}" -AsPlainText -Force

Set-ADAccountPassword -Identity $Username -NewPassword $Password -Reset
Set-ADUser -Identity $Username -ChangePasswordAtLogon $true

Write-Host "✓ Hasło dla $Username zostało zresetowane." -ForegroundColor Green`
  },
  disableuser:{
    label:'Dezaktywacja konta AD',
    fields:[
      {id:'user',label:'SamAccountName',placeholder:'jkowalski',half:true},
      {id:'desc',label:'Powód dezaktywacji',placeholder:'Rozwiązanie umowy 2026-06-01',half:true},
    ],
    hint:'Opcjonalne: odkomentuj Move-ADObject żeby przenieść do OU dezaktywowanych.',
    gen:(f)=>`# Dezaktywacja konta: ${f.user}
$Username = "${f.user}"

Disable-ADAccount -Identity $Username
Set-ADUser -Identity $Username -Description "${f.desc}"

# Opcjonalnie — przenieś do OU dezaktywowanych:
# $DN = (Get-ADUser $Username).DistinguishedName
# Move-ADObject -Identity $DN \`
#     -TargetPath "OU=Dezaktywowani,DC=firma,DC=local"

Write-Host "✓ Konto $Username zostało dezaktywowane." -ForegroundColor Yellow`
  },
  groupmember:{
    label:'Dodaj do grupy AD',
    fields:[
      {id:'user',label:'SamAccountName',placeholder:'jkowalski',half:true},
      {id:'group',label:'Nazwa grupy AD',placeholder:'GRP_VPN_Users',half:true},
    ],
    hint:'Aby dodać wielu userów naraz, podaj ich po przecinku w polu SamAccountName.',
    gen:(f)=>`# Dodaj do grupy: ${f.group}
$Username  = "${f.user}"
$GroupName = "${f.group}"

Add-ADGroupMember -Identity $GroupName -Members $Username

# Weryfikacja:
Get-ADGroupMember -Identity $GroupName | Where-Object {$_.SamAccountName -eq $Username}

Write-Host "✓ $Username dodany do grupy $GroupName." -ForegroundColor Green`
  },
  m365license:{
    label:'Licencja M365',
    fields:[
      {id:'upn',label:'UPN użytkownika',placeholder:'jkowalski@firma.pl'},
      {id:'sku',label:'SKU licencji (np. ENTERPRISEPACK)',placeholder:'ENTERPRISEPACK',half:true},
      {id:'tenant',label:'Tenant (opcjonalnie)',placeholder:'firma',half:true},
    ],
    hint:'Wymaga modułu MSOnline lub Microsoft.Graph. Uruchom Connect-MsolService przed użyciem.',
    gen:(f)=>`# Przypisz licencję M365: ${f.upn}
# Najpierw połącz się z tenant:
# Connect-MsolService
# lub: Connect-MgGraph -Scopes "User.ReadWrite.All","Organization.Read.All"

$UPN     = "${f.upn}"
$SkuName = "${f.sku}"

# --- Metoda MSOnline (klasyczna) ---
$TenantId = (Get-MsolDomain | Where-Object {$_.IsDefault}).Name
$License  = "$TenantId:$SkuName"
Set-MsolUserLicense -UserPrincipalName $UPN -AddLicenses $License

# --- Metoda Graph (nowsza) ---
# $SkuId = (Get-MgSubscribedSku | Where-Object {$_.SkuPartNumber -eq $SkuName}).SkuId
# Set-MgUserLicense -UserId $UPN \`
#     -AddLicenses @{SkuId = $SkuId} \`
#     -RemoveLicenses @()

Write-Host "✓ Licencja $SkuName przypisana do $UPN." -ForegroundColor Green`
  },
  getadinfo:{
    label:'Informacje o użytkowniku AD',
    fields:[
      {id:'user',label:'SamAccountName lub UPN',placeholder:'jkowalski'},
    ],
    hint:'Wyświetla najważniejsze atrybuty, status konta i przynależność do grup.',
    gen:(f)=>`# Informacje o użytkowniku: ${f.user}
$Username = "${f.user}"

$User = Get-ADUser -Identity $Username -Properties * | Select-Object \`
    DisplayName, SamAccountName, UserPrincipalName,
    EmailAddress, Department, Title, Manager,
    Enabled, LockedOut, PasswordExpired,
    PasswordLastSet, LastLogonDate,
    Created, Modified

$User | Format-List

# Przynależność do grup:
Write-Host "\n--- Grupy ---" -ForegroundColor Cyan
(Get-ADUser $Username -Properties MemberOf).MemberOf |
    ForEach-Object { (Get-ADGroup $_).Name } |
    Sort-Object`
  },
};

// Build fields
function renderFields(type){
  const tpl=templates[type];
  const fields=tpl.fields;
  let html='';
  let i=0;
  while(i<fields.length){
    const f=fields[i];
    if(f.half&&i+1<fields.length&&fields[i+1].half){
      html+=`<div class="form-group"><div class="form-row">
        <div><label>${f.label}</label><input type="text" id="ps_${f.id}" placeholder="${f.placeholder}"></div>
        <div><label>${fields[i+1].label}</label><input type="text" id="ps_${fields[i+1].id}" placeholder="${fields[i+1].placeholder}"></div>
      </div></div>`;
      i+=2;
    } else {
      html+=`<div class="form-group"><label>${f.label}</label><input type="text" id="ps_${f.id}" placeholder="${f.placeholder}"></div>`;
      i++;
    }
  }
  $('psFields').innerHTML=html;
  $('results').style.display='none';
}

// Tabs
$('typeTabs').addEventListener('click',e=>{
  const tab=e.target.closest('.type-tab');
  if(!tab)return;
  document.querySelectorAll('.type-tab').forEach(t=>t.classList.remove('active'));
  tab.classList.add('active');
  currentType=tab.dataset.type;
  renderFields(currentType);
});

$('generateBtn').addEventListener('click',generate);

function generate(){
  const tpl=templates[currentType];
  const values={};
  for(const f of tpl.fields){
    const el=$('ps_'+f.id);
    values[f.id]=el&&el.value.trim()?el.value.trim():el.placeholder;
  }
  currentScript=tpl.gen(values);
  $('scriptOutput').textContent=currentScript;
  $('scriptLabel').textContent=tpl.label;
  $('scriptHint').textContent=tpl.hint;
  $('results').style.display='block';
}

async function copyScript(btn){
  if(!currentScript)return;
  try{
    await navigator.clipboard.writeText(currentScript);
    const o=btn.textContent;btn.textContent='✓ OK';btn.style.borderColor='var(--green)';btn.style.color='var(--green)';
    setTimeout(()=>{btn.textContent=o;btn.style.borderColor='';btn.style.color='';},1500);
  }catch{}
}

function downloadScript(){
  if(!currentScript)return;
  const name=templates[currentType].label.replace(/\s+/g,'_').toLowerCase()+'.ps1';
  const blob=new Blob([currentScript],{type:'text/plain'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download=name;
  a.click();
}

renderFields('newuser');
</script>
</body>
</html>
