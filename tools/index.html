<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IT Toolbox — Autoryzacja</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#1a1d23;--bg-darker:#14161b;--bg-card:#1f2229;--bg-card-hover:#262930;
    --accent:#40e8da;--accent-dim:rgba(122,203,228,.233);--accent-border:rgba(14,63,78,.514);
    --cyan:#40c8e8;--cyan-dim:rgba(64,200,232,.10);--cyan-border:rgba(64,200,232,.20);
    --text:#c8cad0;--text-bright:#e4e6ea;--text-muted:#7a7e88;--text-dim:#50545e;
    --line:rgba(200,202,208,.08);--line-strong:rgba(200,202,208,.15);
    --font-title:'Space Grotesk',sans-serif;--font-body:'Inter',sans-serif;--font-mono:'JetBrains Mono',monospace;
  }
  *,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
  body{
    font-family:var(--font-body);background:var(--bg);color:var(--text);
    line-height:1.65;min-height:100vh;
    background-image:linear-gradient(var(--line) 1px,transparent 1px),linear-gradient(90deg,var(--line) 1px,transparent 1px);
    background-size:60px 60px;
  }

  nav{
    padding:1rem 2rem;display:flex;justify-content:space-between;align-items:center;
    background:rgba(26,29,35,.92);backdrop-filter:blur(16px);
    border-bottom:1px solid var(--line-strong);position:sticky;top:0;z-index:100;
  }
  .nav-logo{font-family:var(--font-mono);font-size:1rem;font-weight:600;color:var(--accent);text-decoration:none;letter-spacing:.05em;}
  .nav-links{display:flex;gap:2rem;list-style:none;}
  .nav-links a{
    color:var(--text-muted);text-decoration:none;font-family:var(--font-mono);
    font-size:.7rem;font-weight:500;letter-spacing:.1em;text-transform:uppercase;transition:color .2s;
  }
  .nav-links a:hover{color:var(--cyan);}

  /* LOGIN SCREEN */
  .login-screen{
    display:flex;align-items:center;justify-content:center;
    min-height:calc(100vh - 60px);padding:2rem;
  }
  .login-box{
    width:100%;max-width:380px;text-align:center;
  }
  .login-icon{font-size:2.5rem;margin-bottom:1rem;}
  .login-box h1{
    font-family:var(--font-title);font-size:1.5rem;font-weight:600;
    color:var(--text-bright);margin-bottom:.4rem;
  }
  .login-box p{color:var(--text-muted);font-size:.85rem;margin-bottom:2rem;}
  .login-field{
    width:100%;padding:.75rem 1rem;background:var(--bg-card);
    border:1px solid var(--line-strong);color:var(--text-bright);
    font-family:var(--font-mono);font-size:.9rem;outline:none;
    transition:border-color .2s;text-align:center;letter-spacing:.15em;
    margin-bottom:.75rem;
  }
  .login-field:focus{border-color:var(--accent);}
  .login-field::placeholder{color:var(--text-dim);letter-spacing:.05em;}
  .login-btn{
    width:100%;padding:.75rem;background:var(--accent);color:var(--bg-darker);
    border:none;font-family:var(--font-mono);font-size:.75rem;font-weight:700;
    letter-spacing:.1em;text-transform:uppercase;cursor:pointer;transition:all .2s;
  }
  .login-btn:hover{box-shadow:0 0 25px rgba(64,232,218,.2);transform:translateY(-1px);}
  .login-error{
    color:#e84040;font-family:var(--font-mono);font-size:.7rem;
    margin-top:.75rem;letter-spacing:.05em;display:none;
  }
  .login-hint{
    color:var(--text-dim);font-family:var(--font-mono);font-size:.55rem;
    margin-top:1.5rem;letter-spacing:.08em;text-transform:uppercase;
  }

  /* CONTENT AREA */
  #content{display:none;}

  footer{
    text-align:center;padding:2rem;border-top:1px solid var(--line-strong);
    color:var(--text-dim);font-family:var(--font-mono);font-size:.6rem;letter-spacing:.08em;
  }
</style>
</head>
<body>

<nav>
  <a href="../index.html" class="nav-logo">HZ://</a>
  <ul class="nav-links">
    <li><a href="../index.html">Wizytówka</a></li>
    <li><a href="index.html">Toolbox</a></li>
  </ul>
</nav>

<div id="loginScreen" class="login-screen">
  <div class="login-box">
    <div class="login-icon">🔒</div>
    <h1>Autoryzacja</h1>
    <p>Toolbox wymaga hasła dostępu</p>
    <input type="password" class="login-field" id="passInput" placeholder="Wprowadź hasło" autofocus>
    <button class="login-btn" id="unlockBtn">▶ Odblokuj</button>
    <div class="login-error" id="loginError">BŁĄD: NIEPRAWIDŁOWE HASŁO</div>
    <div class="login-hint">Sekcja zabezpieczona — szyfrowanie AES-256-GCM</div>
  </div>
</div>

async function decrypt(password) {
  try {
    const salt = Uint8Array.from(atob(ENCRYPTED.salt), c => c.charCodeAt(0));
    const iv = Uint8Array.from(atob(ENCRYPTED.iv), c => c.charCodeAt(0));
    const data = Uint8Array.from(atob(ENCRYPTED.data), c => c.charCodeAt(0));

    const keyMaterial = await crypto.subtle.importKey(
      'raw', new TextEncoder().encode(password), 'PBKDF2', false, ['deriveBits']
    );
    const keyBits = await crypto.subtle.deriveBits(
      { name: 'PBKDF2', salt, iterations: 100000, hash: 'SHA-256' },
      keyMaterial, 256
    );
    const key = await crypto.subtle.importKey(
      'raw', keyBits, 'AES-GCM', false, ['decrypt']
    );
    const decrypted = await crypto.subtle.decrypt(
      { name: 'AES-GCM', iv }, key, data
    );
    return new TextDecoder().decode(decrypted);
  } catch (e) {
    return null;
  }
}

async function tryUnlock() {
  const pass = document.getElementById('passInput').value;
  if (!pass) return;

  const html = await decrypt(pass);
  if (html) {
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('content').style.display = 'block';
    document.getElementById('content').innerHTML = html;
    sessionStorage.setItem('toolbox_pass', pass);
  } else {
    const err = document.getElementById('loginError');
    err.style.display = 'block';
    document.getElementById('passInput').value = '';
    document.getElementById('passInput').focus();
    setTimeout(() => { err.style.display = 'none'; }, 3000);
  }
}

document.getElementById('unlockBtn').addEventListener('click', tryUnlock);
document.getElementById('passInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') tryUnlock();
});

// Auto-unlock if password in session
(async () => {
  const saved = sessionStorage.getItem('toolbox_pass');
  if (saved) {
    document.getElementById('passInput').value = saved;
    await tryUnlock();
  }
})();
</script>
